services:
  # Background worker — runs listener.py 24/7
  # Handles: Telegram commands (/digest, /start, /help, /users)
  # AND: scheduled digests at 7:30AM, 12PM, 9PM SGT (built-in scheduler)
  - type: worker
    name: sg-news-bot-listener
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python listener.py
    disk:
      name: sgnews-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false   # Set manually in Render dashboard
      - key: TELEGRAM_CHAT_ID
        value: "472397582"
      - key: ADMIN_CHAT_ID
        value: "472397582"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: SKIP_REDDIT
        value: "true"  # Reddit is blocked on Render servers (SSL/IP block)
